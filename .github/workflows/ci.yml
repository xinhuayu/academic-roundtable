name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements.txt
      - name: Run backend tests
        env:
          PYTHONPATH: backend
        run: python -m pytest backend/tests -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: corepack enable
      - run: corepack prepare pnpm@10 --activate
      - run: pnpm --dir frontend install --frozen-lockfile
      - run: pnpm --dir frontend build

  repository-safety:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Reject tracked local environment files
        shell: bash
        run: |
          if git ls-files | grep -E '(^|/)[.]env([.]local|[.].*[.]local)?$'; then
            echo "Local environment files must never be committed."
            exit 1
          fi
      - name: Confirm example configuration exists
        run: test -f .env.example
